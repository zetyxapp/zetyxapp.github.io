// Вставь это ВМЕСТО существующего <script> в твоем HTML
const API_URL = "http://144.31.223.15:5000"; // Твой IP VDS
let tg = window.Telegram.WebApp;
tg.expand();

let userId = tg.initDataUnsafe?.user?.id || "0";
let balance = 0; // Изначально 0
let bet = 5000;
let fs = 0;
let isAuto = false, isTurbo = false, isSpinning = false;
let fsWinTotal = 0;
let stickies = new Map();

// Загрузка баланса с сервера
async function loadBalance() {
    try {
        const res = await fetch(`${API_URL}/get_balance?user_id=${userId}`);
        const data = await res.json();
        balance = data.balance;
        updateBal();
    } catch (e) { console.error("Ошибка сети"); }
}

// Сохранение баланса на сервер
async function syncBalance() {
    await fetch(`${API_URL}/set_balance`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, balance: balance })
    });
}

const SYMS_DATA = [
    { s: '👹', v: [37.5, 7.50, 2.50] }, { s: '😈', v: [25.0, 5.00, 1.75] },
    { s: '🥶', v: [15.0, 3.00, 1.25] }, { s: '🤖', v: [10.0, 2.00, 1.00] },
    { s: '🐷', v: [7.50, 1.25, 0.60] }, { s: '🦋', v: [5.00, 1.00, 0.40] },
    { s: '🦍', v: [2.50, 0.50, 0.25] }, { s: '🐯', v: [2.50, 0.50, 0.25] },
    { s: '🍔', v: [1.25, 0.25, 0.10] }, { s: '🍓', v: [1.25, 0.25, 0.10] },
    { s: '🍭', v: [1.25, 0.25, 0.10] }
];
const SYMS = SYMS_DATA.map(x => x.s).concat(['🥈','🥉','💰']);

function init() {
    const g = document.getElementById('grid');
    g.innerHTML = ""; // Очистка
    for(let i=0; i<20; i++) g.innerHTML += `<div class="cell">${SYMS[Math.floor(Math.random()*11)]}</div>`;
    
    const bg = document.getElementById('bg-deco');
    for(let i=0; i<15; i++) {
        let t = document.createElement('div');
        t.className = 'tri';
        t.style.left = Math.random()*100 + '%';
        t.style.top = Math.random()*100 + '%';
        bg.appendChild(t);
    }

    const rl = document.getElementById('rules-list');
    SYMS_DATA.forEach(item => {
        rl.innerHTML += `<div class="rule-item"><span class="emoji">${item.s}</span><div class="rule-vals">5 — x${item.v[0].toFixed(1)}<br>4 — x${item.v[1].toFixed(2)}<br>3 — x${item.v[2].toFixed(2)}</div></div>`;
    });
    updateBuyPrice();
    loadBalance(); // Тянем баланс при старте
}

function manualBet() {
    if(isSpinning) return;
    document.getElementById('bet-input').value = bet;
    document.getElementById('modal-bet').style.display = 'flex';
    document.getElementById('bet-input').focus();
}

function closeBetModal() { document.getElementById('modal-bet').style.display = 'none'; }

function confirmManualBet() {
    let val = document.getElementById('bet-input').value;
    if(val && !isNaN(val)) { bet = Math.max(10, parseInt(val)); updateBetUI(); }
    closeBetModal();
}

function setBet(f) {
    if(isSpinning) return;
    bet = Math.max(10, Math.floor(bet * f));
    updateBetUI();
}

function updateBetUI() {
    document.getElementById('bet-display').innerText = "$"+bet.toLocaleString();
    updateBuyPrice();
}

function updateBuyPrice() { 
    let price = bet * 20;
    document.getElementById('buy-price').innerText = price.toLocaleString(); 
    document.getElementById('conf-price').innerText = "$" + price.toLocaleString();
}

function askBuyBonus() {
    if(balance < bet*20 || isSpinning) return;
    document.getElementById('modal-confirm').style.display = 'flex';
}

function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }

function confirmBuy() {
    closeConfirm();
    balance -= bet*20; 
    updateBal();
    syncBalance(); // Синхра после покупки
    showWinModal("ПОЗДРАВЛЯЕМ!", 13, "БЕСПЛАТНЫХ ВРАЩЕНИЙ");
}

async function startSpin() {
    if(balance < bet && fs === 0) return;
    isSpinning = true; updateBtn(true);
    document.getElementById('win-text').innerText = "ВЫИГРЫШ $0";
    if(fs === 0) { balance -= bet; updateBal(); }

    const cells = document.querySelectorAll('.cell');
    cells.forEach(c => { c.classList.remove('win-pulse', 'dim', 'spinning', 'spinning-turbo'); });

    for(let col = 0; col < 5; col++) {
        for(let row = 0; row < 4; row++) {
            let idx = col + row * 5;
            if(!stickies.has(idx)) {
                let pool = Math.random() > 0.98 ? SYMS : SYMS.slice(0, 11);
                cells[idx].innerText = pool[Math.floor(Math.random()*pool.length)];
                cells[idx].classList.add(isTurbo ? 'spinning-turbo' : 'spinning');
            }
        }
        if(!isTurbo) await new Promise(r => setTimeout(r, 100));
    }

    if(!isTurbo) await new Promise(r => setTimeout(r, 300));

    if(fs > 0 && Math.random() < 0.22) {
        let avail = Array.from({length:20}, (_,i)=>i).filter(i => !stickies.has(i));
        if(avail.length > 0) {
            let pos = avail[Math.floor(Math.random()*avail.length)];
            cells[pos].innerText = Math.random() > 0.5 ? '🥈' : '🥉';
        }
    }
    checkWins();
}

async function handleSpin() {
    if(isAuto) { isAuto = false; document.getElementById('t-auto').classList.remove('active'); updateBtn(false); return; }
    if(isSpinning) return;
    startSpin();
}

function checkWins() {
    const cells = document.querySelectorAll('.cell');
    const grid = Array.from(cells).map(c => c.innerText);
    let totalWin = 0;
    let winners = new Set();
    
    SYMS_DATA.forEach(item => {
        let count = 0;
        for(let i=0; i<5; i++) {
            let match = false;
            for(let row=0; row<4; row++) {
                if(grid[i + row*5] === item.s || grid[i + row*5] === '🥈' || grid[i + row*5] === '🥉') {
                    match = true; winners.add(i + row*5);
                }
            }
            if(match) count++; else break;
        }
        if(count >= 3) { totalWin += (bet * item.v[5-count]); }
        else { /* Чистка если не сыграло */ }
    });

    if(totalWin > 0) {
        cells.forEach((c, i) => winners.has(i) ? c.classList.add('win-pulse') : c.classList.add('dim'));
        animateNum('win-text', 0, totalWin, "ВЫИГРЫШ $");
    }

    if(fs > 0) {
        grid.forEach((s, i) => { 
            if((s==='🥈' || s==='🥉') && !stickies.has(i)) {
                stickies.set(i, s);
                cells[i].classList.add('sticky');
            }
        });
    }

    balance += totalWin;
    if(fs > 0) fsWinTotal += totalWin;
    updateBal();
    syncBalance(); // Синхра после каждого винрейта

    if(grid.filter(x => x === '💰').length >= 3) {
        setTimeout(() => showWinModal("ПОЗДРАВЛЯЕМ!", 13, "БЕСПЛАТНЫХ ВРАЩЕНИЙ"), 800);
    } else if(fs > 0) {
        fs--; document.getElementById('fs-count').innerText = fs;
        if(fs === 0) setTimeout(() => showWinModal("БОНУС ОКОНЧЕН", fsWinTotal, "ОБЩИЙ ВЫИГРЫШ"), 800);
        else setTimeout(startSpin, 1000);
    } else {
        isSpinning = false; updateBtn(false);
        if(isAuto) setTimeout(startSpin, 800);
    }
}

function animateNum(id, s, e, p) {
    let obj = document.getElementById(id), curr = 0, step = e/20;
    let t = setInterval(() => {
        curr += step; if(curr >= e) { curr = e; clearInterval(t); }
        obj.innerText = p + Math.floor(curr).toLocaleString();
    }, 40);
}

function showWinModal(t, n, d) {
    document.getElementById('m-title').innerText = t;
    document.getElementById('m-desc').innerText = d;
    document.getElementById('modal-win').style.display = 'flex';
    animateNum('m-num', 0, n, "");
    if(t === "ПОЗДРАВЛЯЕМ!") { fs = 13; fsWinTotal = 0; }
}

function closeWinModal() {
    document.getElementById('modal-win').style.display = 'none';
    if(fs > 0) {
        document.getElementById('fs-label').style.visibility = 'visible';
        document.getElementById('fs-count').innerText = fs;
        startSpin();
    } else {
        document.getElementById('fs-label').style.visibility = 'hidden';
        stickies.clear();
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('sticky', 'dim', 'win-pulse', 'spinning', 'spinning-turbo'));
        isSpinning = false; updateBtn(false);
    }
}

function updateBal() { document.getElementById('bal-val').innerText = balance.toLocaleString(); }
function updateBtn(r) {
    document.getElementById('svg-play').style.display = (r||isAuto) ? 'none' : 'block';
    document.getElementById('svg-stop').style.display = (r||isAuto) ? 'block' : 'none';
}
function toggle(t) {
    if(t === 'turbo') { isTurbo = !isTurbo; document.getElementById('t-turbo').classList.toggle('active'); }
    if(t === 'auto') { isAuto = !isAuto; document.getElementById('t-auto').classList.toggle('active'); if(isAuto && !isSpinning) startSpin(); }
}
function openRules(v) { document.getElementById('rules-page').style.display = v ? 'block' : 'none'; }

init();
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
