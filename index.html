<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NekoVault — Каталог питомцев</title>
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-input: #1a1a24;
            --border-subtle: #232330;
            --text-primary: #e0dfe6;
            --text-secondary: #8b8a96;
            --accent-purple: #a855f7;
            --accent-purple-glow: #c084fc;
            --accent-green: #4ade80;
            --accent-red: #f87171;
            --accent-red-glow: #fca5a5;
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --shadow-glow-purple: 0 0 18px rgba(168, 85, 247, 0.25);
            --shadow-glow-green: 0 0 14px rgba(74, 222, 128, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(168, 85, 247, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(74, 222, 128, 0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(192, 132, 252, 0.02) 0%, transparent 70%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 24px 60px;
        }

        /* Header */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-glow-purple);
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e0dfe6 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-smooth);
            letter-spacing: 0.01em;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-admin {
            background: transparent;
            border-color: var(--border-subtle);
            color: var(--text-secondary);
        }
        .btn-admin:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple-glow);
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.2);
        }

        .btn-buy {
            background: var(--accent-purple);
            color: #fff;
            border-color: var(--accent-purple);
            box-shadow: 0 4px 16px rgba(168, 85, 247, 0.3);
            font-weight: 700;
        }
        .btn-buy:hover {
            background: #9333ea;
            box-shadow: 0 6px 24px rgba(168, 85, 247, 0.5);
            transform: translateY(-1px);
        }

        .btn-add {
            background: transparent;
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
        .btn-add:hover {
            background: rgba(74, 222, 128, 0.08);
            box-shadow: var(--shadow-glow-green);
        }

        .btn-close {
            background: var(--bg-input);
            border-color: var(--border-subtle);
            color: var(--text-secondary);
        }
        .btn-close:hover {
            border-color: #555;
            color: #fff;
        }

        .btn-danger {
            background: transparent;
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.1);
            box-shadow: 0 0 16px rgba(248, 113, 113, 0.35);
        }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .stat-chip {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-chip span {
            color: var(--text-primary);
            font-weight: 700;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.green {
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }
        .dot.purple {
            background: var(--accent-purple);
            box-shadow: 0 0 8px var(--accent-purple);
        }

        /* Grid */
        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
            border: 1px dashed var(--border-subtle);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        /* Card */
        .pet-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all var(--transition-smooth);
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .pet-card:hover {
            border-color: #3d3d50;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(168, 85, 247, 0.1);
            transform: translateY(-3px);
        }

        .pet-card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #0d0d16;
            border-bottom: 1px solid var(--border-subtle);
        }

        .pet-card-body {
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .pet-name {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #fff;
            text-shadow: 0 0 8px rgba(192, 132, 252, 0.3);
        }

        .pet-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pet-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent-green);
            margin-top: auto;
            letter-spacing: -0.02em;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.4);
        }

        .pet-card .btn-buy {
            width: 100%;
            justify-content: center;
            margin-top: 6px;
            padding: 12px;
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 480px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7), 0 0 30px rgba(168, 85, 247, 0.15);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal h2 {
            font-size: 1.4rem;
            margin-bottom: 22px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border var(--transition-fast);
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }
        .form-group textarea {
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1a24;
            border: 1px solid var(--border-subtle);
            padding: 14px 22px;
            border-radius: 999px;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            z-index: 200;
            animation: slideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success { border-color: var(--accent-green); }
        .toast.error { border-color: var(--accent-red); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Login specific */
        .login-modal .modal {
            max-width: 360px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon">🐾</div>
                <div class="logo-text">NekoVault</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-admin" id="btnOpenLogin">🔐 Админ-панель</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-chip"><span class="dot green"></span> Доступно: <span id="statAvailable">0</span></div>
            <div class="stat-chip"><span class="dot purple"></span> Всего в каталоге: <span id="statTotal">0</span></div>
        </div>

        <!-- Grid -->
        <div class="pets-grid" id="petsGrid">
            <div class="empty-state">
                <div class="icon">🐈</div>
                <p>Питомцы загружаются...</p>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay login-modal" id="loginModal">
        <div class="modal">
            <h2>🔐 Доступ администратора</h2>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль..." autocomplete="off">
            </div>
            <div class="modal-actions">
                <button class="btn btn-close" id="btnCloseLogin">Отмена</button>
                <button class="btn btn-buy" id="btnLogin">Войти</button>
            </div>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <h2>✨ Добавить питомца</h2>
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="addName" placeholder="Пушистик">
            </div>
            <div class="form-group">
                <label>Ссылка на фото (URL)</label>
                <input type="url" id="addPhoto" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Описание / Характеристики</label>
                <textarea id="addDesc" placeholder="Любит спать и охотиться за лазером..."></textarea>
            </div>
            <div class="form-group">
                <label>Цена (m¢)</label>
                <input type="number" id="addPrice" placeholder="5000000" min="1">
            </div>
            <div class="modal-actions">
                <button class="btn btn-close" id="btnCloseAdmin">Закрыть</button>
                <button class="btn btn-add" id="btnAddCat">➕ Добавить в каталог</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const API_BASE = 'http://localhost:8000';
            const ADMIN_PASSWORD = 'lainee233';

            // State
            let isAdmin = false;
            let allCats = [];

            // DOM Elements
            const petsGrid = document.getElementById('petsGrid');
            const statAvailable = document.getElementById('statAvailable');
            const statTotal = document.getElementById('statTotal');

            // Login Modal
            const loginModal = document.getElementById('loginModal');
            const btnOpenLogin = document.getElementById('btnOpenLogin');
            const btnCloseLogin = document.getElementById('btnCloseLogin');
            const btnLogin = document.getElementById('btnLogin');
            const loginPassword = document.getElementById('loginPassword');

            // Admin Modal
            const adminModal = document.getElementById('adminModal');
            const btnCloseAdmin = document.getElementById('btnCloseAdmin');
            const btnAddCat = document.getElementById('btnAddCat');
            const addName = document.getElementById('addName');
            const addPhoto = document.getElementById('addPhoto');
            const addDesc = document.getElementById('addDesc');
            const addPrice = document.getElementById('addPrice');

            // Toast
            function showToast(message, type = 'success') {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();

                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `${type === 'success' ? '✅' : '❌'} ${message}`;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            // Format price
            function formatPrice(price) {
                return Number(price).toLocaleString('en-US') + ' m¢';
            }

            // Fetch cats
            async function fetchCats() {
                try {
                    const res = await fetch(`${API_BASE}/api/cats`);
                    if (!res.ok) throw new Error('Ошибка загрузки');
                    allCats = await res.json();
                    renderGrid();
                    updateStats();
                } catch (err) {
                    console.error(err);
                    petsGrid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Не удалось загрузить каталог. Проверьте сервер.</p></div>`;
                    statAvailable.textContent = '0';
                    statTotal.textContent = '0';
                }
            }

            // Render
            function renderGrid() {
                if (allCats.length === 0) {
                    petsGrid.innerHTML = `<div class="empty-state"><div class="icon">🐈</div><p>Все питомцы нашли дом! Каталог пуст.</p></div>`;
                    return;
                }

                petsGrid.innerHTML = allCats.map(cat => `
                    <div class="pet-card" data-id="${cat.id}">
                        <img class="pet-card-img" src="${cat.photo_url}" alt="${cat.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%2312121a%22 width=%22200%22 height=%22200%22/><text fill=%22%23555%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2220%22>🐾</text></svg>'">
                        <div class="pet-card-body">
                            <div class="pet-name">${escapeHTML(cat.name)}</div>
                            <div class="pet-desc">${escapeHTML(cat.description)}</div>
                            <div class="pet-price">${formatPrice(cat.price)}</div>
                            <button class="btn btn-buy" onclick="window.buyCat(${cat.id}, '${escapeHTML(cat.name)}')">
                                ⚡ Купить
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            function updateStats() {
                statAvailable.textContent = allCats.length;
                statTotal.textContent = allCats.length;
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // Buy cat
            window.buyCat = async function(id, name) {
                try {
                    const res = await fetch(`${API_BASE}/api/cats/${id}/buy`, { method: 'POST' });
                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        throw new Error(errData.detail || 'Ошибка покупки');
                    }
                    const data = await res.json();
                    showToast(data.message || 'Питомец куплен!', 'success');
                    fetchCats();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            };

            // Add cat
            async function addCat() {
                const name = addName.value.trim();
                const photo = addPhoto.value.trim();
                const desc = addDesc.value.trim();
                const price = parseInt(addPrice.value, 10);

                if (!name || !photo || !desc || !price || price < 1) {
                    showToast('Заполните все поля корректно', 'error');
                    return;
                }

                try {
                    const res = await fetch(`${API_BASE}/api/cats/add`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, photo_url: photo, description: desc, price })
                    });
                    if (!res.ok) throw new Error('Ошибка добавления');
                    showToast(`${name} добавлен в каталог!`, 'success');
                    closeAdminModal();
                    fetchCats();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            }

            // Modal controls
            function openLoginModal() {
                loginPassword.value = '';
                loginModal.classList.add('active');
                setTimeout(() => loginPassword.focus(), 100);
            }

            function closeLoginModal() {
                loginModal.classList.remove('active');
            }

            function openAdminModal() {
                addName.value = '';
                addPhoto.value = '';
                addDesc.value = '';
                addPrice.value = '';
                adminModal.classList.add('active');
                setTimeout(() => addName.focus(), 100);
            }

            function closeAdminModal() {
                adminModal.classList.remove('active');
            }

            function handleLogin() {
                if (loginPassword.value === ADMIN_PASSWORD) {
                    isAdmin = true;
                    closeLoginModal();
                    openAdminModal();
                    showToast('Добро пожаловать, администратор!', 'success');
                } else {
                    showToast('Неверный пароль', 'error');
                    loginPassword.value = '';
                    loginPassword.focus();
                }
            }

            // Event Listeners
            btnOpenLogin.addEventListener('click', openLoginModal);
            btnCloseLogin.addEventListener('click', closeLoginModal);
            btnLogin.addEventListener('click', handleLogin);
            loginPassword.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            btnCloseAdmin.addEventListener('click', closeAdminModal);
            btnAddCat.addEventListener('click', addCat);

            // Close modals on overlay click
            [loginModal, adminModal].forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        if (modal === loginModal) closeLoginModal();
                        if (modal === adminModal) closeAdminModal();
                    }
                });
            });

            // Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeLoginModal();
                    closeAdminModal();
                }
            });

            // Init
            fetchCats();
        })();
    </script>
</body>
</html>
