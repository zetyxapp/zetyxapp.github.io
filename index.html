<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZETYX MODERN EDITION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://db.onlinewebfonts.com/c/b031b6714d642b588c876f2b0907d353?family=Minecrafter" rel="stylesheet">
    <style>
        :root { --bg: #050508; --panel: #111116; --accent: #ffffff; --win: #00e676; --loss: #ff1744; --mc: 'Minecrafter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; min-height: 100vh; overflow-x: hidden; }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .header { height: 60px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: var(--mc); font-size: 18px; color: #fff; letter-spacing: 2px; cursor: pointer; transition: 0.2s; }
        
        .bal-wrap { display: flex; align-items: center; gap: 8px; z-index: 1100; }
        .bal { border: 1px solid #fff; padding: 5px 12px; border-radius: 4px; font-weight: 900; background: #000; font-family: var(--mc); font-size: 12px; }
        .add-btn { background: #fff; color: #000; border: none; width: 24px; height: 24px; border-radius: 4px; font-weight: 900; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .view { display: none; padding: 15px; max-width: 500px; margin: 0 auto; position: relative; z-index: 10; }
        .active { display: block !important; }

        .hero { text-align: center; margin: 40px 0; }
        .hero h1 { font-family: var(--mc); font-size: 28px; margin-bottom: 10px; text-transform: uppercase; }
        .hero p { color: #555; font-size: 10px; letter-spacing: 2px; }

        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: rgba(17, 17, 22, 0.8); border: 1px solid rgba(255,255,255,0.05); padding: 40px 10px; text-align: center; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); }
        .card:hover { border-color: #fff; transform: translateY(-5px); }
        .card i { font-size: 30px; display: block; margin-bottom: 15px; filter: brightness(2); font-style: normal; }
        .card span { font-family: var(--mc); font-size: 10px; letter-spacing: 1px; color: #aaa; }

        .game-box { background: var(--panel); border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; }
        .ui { padding: 20px; background: #0c0c10; border-bottom: 1px solid #222; display: flex; flex-direction: column; gap: 12px; }
        .play-area { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 250px; justify-content: center; position: relative; }

        .label { font-size: 10px; color: #666; font-weight: 900; margin-bottom: 4px; display: block; }
        input[type="number"] { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; font-weight: 900; outline: none; }
        
        .btn { width: 100%; padding: 16px; background: #fff; border: none; border-radius: 4px; color: #000; font-family: var(--mc); font-size: 14px; cursor: pointer; }
        .btn-win { background: var(--win) !important; color: #000; }

        .row { display: flex; gap: 6px; }
        .opt { flex: 1; padding: 8px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 9px; font-family: var(--mc); cursor: pointer; text-align: center; }
        .opt.selected { border-color: #fff; background: rgba(255,255,255,0.1); }

        .back { font-family: var(--mc); color: #444; font-size: 10px; margin-bottom: 15px; display: inline-block; cursor: pointer; }

        .slider-cont { width: 100%; max-width: 300px; height: 4px; background: #222; position: relative; margin: 30px 0; }
        .slider-fill { height: 100%; background: #444; width: 50%; }
        .dice-stick { position: absolute; top: -12px; width: 2px; height: 30px; background: #fff; z-index: 100; display: none; box-shadow: 0 0 10px #fff; }

        input[type=range] { -webkit-appearance: none; position: absolute; top: -12px; left: 0; width: 100%; height: 30px; background: transparent; z-index: 120; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: #fff; border: 4px solid #000; }

        .t-grid { display: flex; flex-direction: column-reverse; gap: 5px; width: 220px; }
        .t-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; opacity: 0.2; }
        .t-row.on { opacity: 1; }
        .tile, .m-box { aspect-ratio: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .m-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 260px; }
        
        .p-mult-container { display: flex; gap: 2px; width: 100%; margin-top: 5px; }
        .pm { flex: 1; background: #fff; color: #000; font-size: 7px; font-weight: 900; text-align: center; padding: 6px 0; border-radius: 2px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--panel); border: 1px solid #333; padding: 30px; width: 90%; max-width: 350px; text-align: center; border-radius: 8px; }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="header">
    <div class="logo" onclick="playClick(); go('lobby')">ZETYX</div>
    <div class="bal-wrap">
        <div class="bal"><span id="balance">0.00</span> ⭐</div>
        <button class="add-btn" onclick="openDep()">+</button>
    </div>
</div>

<div id="depModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:var(--mc); font-size:14px; margin-bottom:20px;">ДЕПОЗИТ (⭐)</h2>
        <input type="number" id="depAmount" value="50">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" onclick="confirmDep()">КУПИТЬ</button>
            <button class="btn" style="background:#222; color:#fff" onclick="closeDep()">X</button>
        </div>
    </div>
</div>

<div id="lobby" class="view active">
    <div class="hero"><h1>ПРЕОБРАЗИ СВОЙ ДОСУГ</h1><p>STRICT STYLE • HIGH STAKES</p></div>
    <div class="grid-main">
        <div class="card" onclick="playClick(); go('dice')"><i>🎲</i><span>DICE</span></div>
        <div class="card" onclick="playClick(); go('tower')"><i>🏰</i><span>TOWER</span></div>
        <div class="card" onclick="playClick(); go('mines')"><i>💣</i><span>MINES</span></div>
        <div class="card" onclick="playClick(); go('limbo')"><i>🚀</i><span>LIMBO</span></div>
        <div class="card" onclick="playClick(); go('plinko')"><i>🔺</i><span>PLINKO</span></div>
    </div>
</div>

<div id="dice" class="view">
    <span class="back" onclick="playClick(); go('lobby')">← НАЗАД</span>
    <div class="game-box">
        <div class="ui">
            <input type="number" id="dice_bet" value="100">
            <div class="row">
                <div style="flex:1"><span class="label">ИКС</span><div id="dice_m" style="font-family:var(--mc);">1.98x</div></div>
                <div style="flex:1"><span class="label">ШАНС</span><div id="dice_c" style="font-family:var(--mc);">50%</div></div>
            </div>
            <button class="btn" onclick="playDice()">ИГРАТЬ</button>
        </div>
        <div class="play-area">
            <div id="dice_res_text" style="font-family:var(--mc); font-size: 28px; margin-bottom: 10px;">0.00</div>
            <div class="slider-cont"><div class="slider-fill" id="dice_f"></div><div class="dice-stick" id="dice_stick"></div><input type="range" id="dice_r" min="2" max="98" value="50" oninput="updDice(); playTick();"></div>
        </div>
    </div>
</div>

<div id="tower" class="view">
    <span class="back" onclick="playClick(); go('lobby')">← НАЗАД</span>
    <div class="game-box">
        <div class="ui">
            <input type="number" id="tower_bet" value="100">
            <div class="row">
                <button class="opt selected" id="tm1" onclick="playClick(); setTM(1)">1 МИНА</button>
                <button class="opt" id="tm2" onclick="playClick(); setTM(2)">2 МИНЫ</button>
                <button class="opt" id="tm3" onclick="playClick(); setTM(3)">3 МИНЫ</button>
            </div>
            <button class="btn" id="t_start" onclick="startTower()">ИГРАТЬ</button>
            <button class="btn btn-win" id="t_cash" onclick="cashTower()" style="display:none">ЗАБРАТЬ <span id="t_profit">0</span></button>
        </div>
        <div class="play-area"><div class="t-grid" id="t_grid"></div></div>
    </div>
</div>

<div id="mines" class="view">
    <span class="back" onclick="playClick(); go('lobby')">← НАЗАД</span>
    <div class="game-box">
        <div class="ui">
            <input type="number" id="mines_bet" value="100">
            <input type="number" id="mines_cnt" value="3" min="1" max="24">
            <button class="btn" id="m_start" onclick="startMines()">ИГРАТЬ</button>
            <button class="btn btn-win" id="m_cash" onclick="cashMines()" style="display:none">ЗАБРАТЬ <span id="m_profit">0</span></button>
        </div>
        <div class="play-area"><div class="m-grid" id="m_grid"></div></div>
    </div>
</div>

<div id="limbo" class="view">
    <span class="back" onclick="playClick(); go('lobby')">← НАЗАД</span>
    <div class="game-box">
        <div class="ui">
            <input type="number" id="limbo_bet" value="100">
            <input type="number" id="limbo_target" value="2.0" step="0.1">
            <button class="btn" onclick="playLimbo()">ИГРАТЬ</button>
        </div>
        <div class="play-area"><div id="limbo_res_text" style="font-family:var(--mc); font-size:30px;">1.00x</div></div>
    </div>
</div>

<div id="plinko" class="view">
    <span class="back" onclick="playClick(); go('lobby')">← НАЗАД</span>
    <div class="game-box">
        <div class="ui">
            <input type="number" id="plinko_bet" value="100">
            <div class="row" id="p_opts">
                <button class="opt selected" id="pr8" onclick="playClick(); setPR(8)">8 РЯДОВ</button>
                <button class="opt" id="pr12" onclick="playClick(); setPR(12)">12 РЯДОВ</button>
                <button class="opt" id="pr16" onclick="playClick(); setPR(16)">16 РЯДОВ</button>
            </div>
            <button class="btn" id="p_btn" onclick="playPlinko()">ИГРАТЬ</button>
        </div>
        <div class="play-area">
            <canvas id="p_can" width="320" height="250"></canvas>
            <div id="p_mults" class="p-mult-container"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    const SERVER_URL = "http://ТВОЙ_IP:8000"; 
    const uId = tg.initDataUnsafe.user?.id || 0;

    const aCtx = new (window.AudioContext || window.webkitAudioContext)();
    function snd(f, t, d, v) { 
        const o = aCtx.createOscillator(); const g = aCtx.createGain(); 
        o.type = t; o.frequency.setValueAtTime(f, aCtx.currentTime); 
        g.gain.setValueAtTime(0, aCtx.currentTime); g.gain.linearRampToValueAtTime(v, aCtx.currentTime + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime + d); 
        o.connect(g); g.connect(aCtx.destination); o.start(); o.stop(aCtx.currentTime + d); 
    }
    const playClick = () => snd(440, 'triangle', 0.15, 0.08);
    const playTick = () => snd(330, 'sine', 0.1, 0.05);
    const playWin = () => { snd(523.25, 'triangle', 0.3, 0.1); setTimeout(()=>snd(659.25, 'triangle', 0.4, 0.1), 120); };
    const playLoss = () => snd(220, 'sine', 0.5, 0.12);

    let bal = 0.0;
    const multData = { 8: [5, 2, 1.2, 0.5, 0.2, 0.5, 1.2, 2, 5], 12: [10, 5, 2, 1.2, 0.5, 0.2, 0.1, 0.2, 0.5, 1.2, 2, 5, 10], 16: [50, 20, 10, 5, 2, 1.2, 0.5, 0.2, 0.1, 0.2, 0.5, 1.2, 2, 5, 10, 20, 50] };

    async function fetchBal() {
        if(!uId) return;
        try { const r = await fetch(`${SERVER_URL}/get_balance/${uId}`); const d = await r.json(); bal = d.balance; updBal(); } catch(e) {}
    }
    function openDep() { document.getElementById('depModal').style.display='flex'; }
    function closeDep() { document.getElementById('depModal').style.display='none'; }
    function confirmDep() { let a = document.getElementById('depAmount').value; tg.sendData("pay:" + a); tg.close(); }
    function go(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='tower') resetTower(); if(id==='mines') resetMines(); if(id==='plinko') initPlinko(); }
    function updBal() { document.getElementById('balance').innerText = bal.toFixed(2); }

    // ИГРЫ
    function updDice() { let v = document.getElementById('dice_r').value; document.getElementById('dice_f').style.width = v + '%'; document.getElementById('dice_m').innerText = (98/v).toFixed(2) + 'x'; document.getElementById('dice_c').innerText = v + '%'; }
    function playDice() { let b = +document.getElementById('dice_bet').value, t = +document.getElementById('dice_r').value; if(b > bal || b <= 0) return; bal -= b; let r = (Math.random()*100).toFixed(2); document.getElementById('dice_res_text').innerText = r; document.getElementById('dice_stick').style.display = 'block'; document.getElementById('dice_stick').style.left = r + '%'; if(+r <= t) { bal += b * (98/t); playWin(); } else playLoss(); updBal(); }

    let tL=0, tA=false, tM=1;
    function setTM(n){ tM=n; document.querySelectorAll('#tower .opt').forEach(b=>b.classList.remove('selected')); document.getElementById('tm'+n).classList.add('selected'); }
    function resetTower() { tL=0; tA=false; document.getElementById('t_start').style.display='block'; document.getElementById('t_cash').style.display='none'; const g=document.getElementById('t_grid'); g.innerHTML=''; for(let i=0; i<8; i++){ let r=document.createElement('div'); r.className='t-row'; r.id='tr'+i; for(let j=0; j<4; j++){ let c=document.createElement('div'); c.className='tile'; c.onclick=()=>stepTower(i,j); r.appendChild(c); } g.appendChild(r); } }
    function startTower(){ let b = +document.getElementById('tower_bet').value; if(b > bal) return; bal -= b; updBal(); tA = true; document.getElementById('tr0').classList.add('on'); document.getElementById('t_start').style.display='none'; document.getElementById('t_cash').style.display='block'; }
    function stepTower(r, c) { if(!tA || r !== tL) return; if(Math.random()>0.3){ playTick(); document.getElementById('tr'+r).children[c].style.background='var(--win)'; tL++; if(tL<8) document.getElementById('tr'+tL).classList.add('on'); document.getElementById('t_profit').innerText = (150*tL).toFixed(2); } else { playLoss(); resetTower(); }}
    function cashTower() { bal += parseFloat(document.getElementById('t_profit').innerText); updBal(); resetTower(); }

    function resetMines() { const g=document.getElementById('m_grid'); g.innerHTML=''; for(let i=0; i<25; i++) { let t=document.createElement('div'); t.className='m-box'; t.onclick=()=>stepMines(i); g.appendChild(t); } }
    function startMines() { let b = +document.getElementById('mines_bet').value; if(b > bal) return; bal-=b; updBal(); mA=true; mGr=Array(25).fill(0).map(()=>Math.random()<0.2?1:0); document.getElementById('m_start').style.display='none'; document.getElementById('m_cash').style.display='block'; }
    function stepMines(i) { if(!mA) return; if(mGr[i]===0){ playTick(); document.getElementById('m_grid').children[i].style.background='var(--win)'; } else { playLoss(); resetMines(); } }
    function cashMines() { bal+=100; updBal(); resetMines(); }

    function playLimbo() { let b = +document.getElementById('limbo_bet').value; if(b > bal) return; bal -= b; let r = (Math.random()*5).toFixed(2); document.getElementById('limbo_res_text').innerText = r+'x'; if(r > 2) { bal+=b*2; playWin(); } else playLoss(); updBal(); }

    // --- PLINKO FULL ---
    let pR=8, pBalls=[]; const pCan=document.getElementById('p_can'), pCtx=pCan.getContext('2d');
    function setPR(r) { pR=r; document.querySelectorAll('#plinko .opt').forEach(b=>b.classList.remove('selected')); document.getElementById('pr'+r).classList.add('selected'); initPlinko(); }
    function initPlinko() { 
        pCtx.clearRect(0,0,320,250); pCtx.fillStyle="rgba(255,255,255,0.1)"; 
        const sp=230/(pR+2); for(let i=0; i<pR; i++) { for(let j=0; j<=i; j++) { pCtx.beginPath(); pCtx.arc(160-(i*sp/2)+(j*sp), 20+(i*sp), 2, 0, 7); pCtx.fill(); }}
        const cont = document.getElementById('p_mults'); cont.innerHTML = '';
        multData[pR].forEach(x => { let d=document.createElement('div'); d.className='pm'; d.innerText=x+'x'; cont.appendChild(d); });
    }
    function playPlinko() { let b = +document.getElementById('plinko_bet').value; if(b > bal) return; bal -= b; updBal(); pBalls.push({x:160, y:10, r:0, vx:0, vy:3, b:b}); if(pBalls.length===1) animPlinko(); }
    function animPlinko() { 
        if(!pBalls.length) return; pCtx.clearRect(0,0,320,250); initPlinko(); 
        const sp=230/(pR+2); for(let i=pBalls.length-1; i>=0; i--) { 
            let b = pBalls[i]; b.y += b.vy; b.x += b.vx; let curR = Math.floor((b.y-20)/sp);
            if(curR > b.r && b.r < pR) { playTick(); b.r = curR; b.vx = (Math.random() > 0.5 ? 1 : -1) * (sp/10) + (160 - b.x) * 0.15; }
            pCtx.fillStyle='#fff'; pCtx.beginPath(); pCtx.arc(b.x, b.y, 4, 0, 7); pCtx.fill();
            if(b.y > 20 + pR*sp) { playWin(); let pos = Math.max(0, Math.min(pR, Math.round((b.x-(160-(pR*sp/2)))/sp))); bal += b.b * multData[pR][pos]; updBal(); pBalls.splice(i,1); }
        } requestAnimationFrame(animPlinko); 
    }

    particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "shape": { "type": "triangle" }, "opacity": { "value": 0.15 }, "line_linked": { "enable": true, "opacity": 0.05 }, "move": { "enable": true, "speed": 1.2 } } });
    tg.expand(); fetchBal(); setInterval(fetchBal, 5000); updDice();
</script>
</body>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCwcHXslvUZoFJ6qOd-7TGZXo2dQrWx6Kg",
            authDomain: "fishtiers-b8b0f.firebaseapp.com",

            messagingSenderId: "887698034750",
            appId: "1:887698034750:web:953f8fb88f215c7104816f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let players = [];
        let curMode = 'global', curDevice = 'all', curServer = 'all';

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        window.addEventListener('mousedown', (e) => {
            playClickSound();
            for(let i=0; i<5; i++) {
                const p = document.createElement('div'); p.className = 'click-particle';
                p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                p.style.setProperty('--tx', (Math.random()-0.5)*120 + 'px');
                p.style.setProperty('--ty', (Math.random()-0.5)*120 + 'px');
                document.body.appendChild(p); setTimeout(() => p.remove(), 600);
            }
        });

        function init() {
            const s = JSON.parse(localStorage.getItem('fCfg')) || { color: '#FF0000', blur: 100 };
            document.getElementById('u-color').value = s.color;
            document.getElementById('u-blur').value = s.blur;
            updateUI(false);
        }

        function updateUI(save = true) {
            const c = document.getElementById('u-color').value, b = document.getElementById('u-blur').value;
            document.documentElement.style.setProperty('--accent', c);
            document.documentElement.style.setProperty('--blur', b + 'px');
            document.getElementById('glow').style.background = `radial-gradient(circle at 20% 20%, ${c} 0%, transparent 40%), radial-gradient(circle at 80% 80%, ${c} 0%, transparent 40%)`;
            if(save) localStorage.setItem('fCfg', JSON.stringify({ color: c, blur: b }));
        }

        db.ref('players').on('value', snap => {
            players = snap.val() ? Object.values(snap.val()) : [];
            renderAll();
        });

        function getEliteClass(t) {
            if (t.includes('HT1')) return 't1';
            if (t.includes('HT2')) return 't2';
            if (t.includes('HT3')) return 't3';
            return '';
        }

        function renderAll() {
            const area = document.getElementById('display-area'), search = document.getElementById('search').value.toLowerCase();
            area.innerHTML = '';

            const filtered = players.filter(p => {
                const matchName = p.name.toLowerCase().includes(search);
                const matchDev = (curDevice === 'all' || p.device === curDevice);
                const matchSrv = (curServer === 'all' || p.server === curServer);
                const matchMode = (curMode === 'global') ? (curDevice === 'all' ? p.isGlobal : true) : (curMode === 'bows' ? p.type === 'bow' : p.type === 'sword');
                return matchName && matchDev && matchSrv && matchMode;
            });

            if (curMode === 'global') {
                const grid = document.createElement('div'); grid.className = 'global-grid';
                filtered.sort((a,b) => (curDevice === 'all' ? a.rankGlob - b.rankGlob : a.rankDev - b.rankDev));

                filtered.forEach(p => {
                    const r = (curDevice === 'all' ? p.rankGlob : p.rankDev);
                    if(r <= 0) return;
                    const elite = getEliteClass(p.tier) ? 'card-' + getEliteClass(p.tier) : '';
                    grid.innerHTML += `<div class="player-card ${elite}" onclick="openBio('${p.name}')"><div class="rank-num">#${r}</div><div class="skin-box"><img src="https://minotar.net/helm/${p.name}/60.png"></div><div><b>${p.name}</b><br><small>${p.server.toUpperCase()} | ${p.tier}</small></div></div>`;
                });
                area.appendChild(grid);
            } else {
                const swordTiers = ["HT1", "HT2", "HT3", "MT1", "MT2", "LT1", "LT2", "LT3"];
                const bowTiers = ["HT1", "HT2", "HT3", "HT4", "HT5", "MT1", "MT2", "MT3", "MT4", "MT5", "LT1", "LT2", "LT3", "LT4", "LT5"];
                const tiers = (curMode === 'tiers') ? swordTiers : bowTiers;

                tiers.forEach(t => {
                    const inTier = filtered.filter(p => p.tier === t).sort((a,b) => a.rankDev - b.rankDev);
                    if(inTier.length > 0) {
                        const tc = getEliteClass(t);
                        area.innerHTML += `<div class="tier-row"><div class="tier-label ${tc}">${t}</div><div class="players-wrap">${inTier.map(p => `<div class="p-tag ${tc ? tc+'-tag' : ''}" onclick="openBio('${p.name}')">${p.name}</div>`).join('')}</div></div>`;
                    }
                });
            }
        }

        function setMainMode(m, el) { curMode = m; updateActive(el, '#main-modes'); renderAll(); }
        function setDevice(d, el) { curDevice = d; updateActive(el, '#device-modes'); renderAll(); }
        function setServer(s, el) { curServer = s; updateActive(el, '#srv-modes'); renderAll(); }
        function updateActive(el, id) { document.querySelectorAll(id + ' .nav-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }

        async function saveData() {
            const n = document.getElementById('adm-name').value.trim();
            const rg = parseInt(document.getElementById('adm-rank-glob').value) || 0;
            const isGlob = document.getElementById('adm-global').checked;
            if(!n) return;

            if (isGlob && rg > 0) {
                const updates = {};
                players.forEach(p => {
                    if (p.isGlobal && p.rankGlob >= rg && p.name !== n) {
                        updates[`players/${p.name}/rankGlob`] = p.rankGlob + 1;
                    }
                });
                if (Object.keys(updates).length > 0) {
                    await db.ref().update(updates);
                }
            }

            db.ref('players/' + n).set({
                name: n, tier: document.getElementById('adm-tier').value.toUpperCase(),
                rankDev: parseInt(document.getElementById('adm-rank-dev').value) || 0,
                rankGlob: rg,
                device: document.getElementById('adm-dev').value,
                type: document.getElementById('adm-type').value,
                server: document.getElementById('adm-srv').value,
                isGlobal: isGlob,
                bio: document.getElementById('adm-bio').value
            }).then(() => alert("Saved!"));
        }

        function deleteData() { const n = document.getElementById('adm-name').value; if(n && confirm("Del?")) db.ref('players/'+n).remove(); }
        
        function openBio(n) {
            const p = players.find(x => x.name === n); if(!p) return;
            document.getElementById('b-name').innerText = p.name;
            document.getElementById('b-img').src = `https://minotar.net/helm/${p.name}/100.png`;
            document.getElementById('b-stats').innerHTML = `DEVICE: ${p.device.toUpperCase()} | TIER: ${p.tier}<br>RANK: #${p.rankDev} (ALL: #${p.rankGlob})`;
            document.getElementById('b-bio-text').innerText = p.bio || "Биография отсутствует.";
            toggleModal('bio-modal');
        }
        
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function auth() { if(btoa(prompt("Pass:")) === "ZG9pcnN5MTIz") document.getElementById('admin-panel').classList.remove('hidden'); }
        init();
    </script>
</body>
</html>
